services:
  - name: oralscan-backend
    repo: https://github.com/miteshkaliya1/OralScan-backend
    nodeVersion: 22
    buildCommand: npm install && npm run build
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://oralscan-frontend.vercel.app
    plan: free